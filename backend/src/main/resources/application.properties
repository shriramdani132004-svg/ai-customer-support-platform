# ===============================
# APPLICATION
# ===============================

spring.application.name=backend
server.port=8080


# ===============================
# DATABASE
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5433/support_db?options=-c%20TimeZone=Asia/Kolkata
spring.datasource.username=support_user
spring.datasource.password=support_password
spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata


# ===============================
# CONNECTION POOL
# ===============================

spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'Asia/Kolkata'