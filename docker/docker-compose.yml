services:

  postgres:
    image: postgres:16
    container_name: support-postgres
    restart: always

    environment:
      POSTGRES_DB: support_db
      POSTGRES_USER: support_user
      POSTGRES_PASSWORD: support_password

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:latest
    container_name: support-redis
    restart: always

    ports:
      - "6379:6379"


volumes:

  postgres_data: