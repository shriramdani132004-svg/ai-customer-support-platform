services:

  postgres:
    image: postgres:16
    container_name: support-postgres

    environment:
      POSTGRES_DB: support_db
      POSTGRES_USER: support_user
      POSTGRES_PASSWORD: support_password
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data



  redis:
    image: redis:latest
    container_name: support-redis

    ports:
      - "6379:6379"




  kafka:
    image: apache/kafka:latest

    container_name: support-kafka


    ports:
      - "9092:9092"


    environment:

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1





  backend:
    build:
      context: ./backend

    container_name: support-backend

    depends_on:
      - postgres
      - redis
      - kafka

    ports:
      - "8080:8080"

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/support_db

      SPRING_DATASOURCE_USERNAME: support_user

      SPRING_DATASOURCE_PASSWORD: support_password

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      OPENAI_API_KEY: ${OPENAI_API_KEY}

      SUPPORT_EMAIL: ${SUPPORT_EMAIL}

      SUPPORT_EMAIL_PASSWORD: ${SUPPORT_EMAIL_PASSWORD}




  frontend:
    build:
      context: ./frontend

    container_name: support-frontend

    depends_on:
      - backend

    ports:
      - "5173:5173"




volumes:

  postgres_data: